<script>

//https://programmers.co.kr/learn/courses/30/lessons/17682

function solution(dartResult) {
    var answer = 0;
    var res = [];
    console.log("dartResult : " , dartResult)
    var matches = Array.from(dartResult)
    var flag = false;
    console.log("dartResult : " , matches)
    for (var i = 0; i < matches.length; ++i) {
        
        switch (matches[i]) {
            case 'S': break;
            case 'D': {
                res[res.length-1] *= res[res.length-1];
                break;
            };
            case 'T':
                res[res.length-1] = Math.pow(res[res.length-1], 3); break 
            case '*': 
                if (res.length > 1) {
                    res[res.length-2] *= 2;
                    res[res.length-1] *= 2;
                }
                break;
            
            case '#':
                res[res.length-1] *= -1;
                break;

            default:
            console.log("matches[i]"+ matches[i] )
            if(matches[i] == 1 && matches[i + 1] == 0 ){
                flag = true
                continue;
                
            }
            if(flag){
                res.push(10);
            }else {
                res.push(matches[i] * 1);
            }
        }
    }

    console.log("res ==> " , res)
    return res.reduce((a, b) => a + b);


}

function init(){

    var value = solution("1S*2T*3S");
    console.log("result ===> " , value)
}

init();
</script>
