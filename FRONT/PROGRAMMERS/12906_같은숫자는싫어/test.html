<script>

function solution(arr)
{
    var answer = [];
    var currentNumber;
    arr.filter(number => {
        if(number != currentNumber){
            answer.push(number)
        }
        currentNumber = number;
    })
    
    console.log('Hello Javascript')
    
    return answer;
}

}
